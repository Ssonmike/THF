services:
  thf:
    build:
      context: .
      dockerfile: Dockerfile
    image: thf:latest
    container_name: thf
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # SQLite database persisted on host
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./data/prod.db
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
